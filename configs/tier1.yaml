coupling_risk:
  # Directive §5 B2 SOFT second-tier flag (THINK T15): reported-only coupling-site-availability.
  # NEVER changes the survivor set or the composite (a hard reject is a PI call — DECISIONS_PENDING B4).
  # B1 showed only POSITION-BLOCKED intrinsic NOs are screening-separable; electronic/beta-steric/
  # radical-overstabilized/3,3'-dimerizing NOs are blind spots (-> Tier-2). The flag can mis-fire on
  # fused/constructed SMILES (alpha undercount) -> stays soft, constructed monomers reviewed.
  enabled: true
  # 5-ring alpha-coupling monomers flagged when fewer than this many free alpha C-H sites remain.
  # 1 => flag only the alpha,alpha'-diblocked case (one free alpha still couples, e.g. 2-methylfuran=YES).
  min_free_alpha: 1
scale_guard:
  # freeze-then-scale ceiling (directive §0/§2). A swapped/expanded library must never silently
  # launch the full ~50,000-triad harvest, which is method-frozen + sign-off gated. run-tier1 raises
  # ScaleGuardError above max_triads unless --allow-large-scale is passed. Current validated scale is
  # 36x13x16 = 7,488; raise this only together with the authorized full-scale run.
  max_triads: 12000
filters:
  min_window_margin_V: 0.3
  min_anion_stability_margin_V: 0.2
  max_solvation_dG_kcal_mol: -3.0
solvation:
  # Directive §4.1 solubility = COSMO-RS. Read the precomputed DECOUPLED openCOSMO-RS dGsolv table
  # (one ORCA sigma-profile per species, cheap pairwise combine) cosmors-first; fall back to the ALPB
  # dGsolv affinity proxy for any (monomer, solvent) absent from the table (measured-first discipline).
  # Only applied for a REAL engine; MockEngine stays pure-mock for deterministic tests.
  prefer_cosmors: true
  cosmors_table_path: data/solvation_cosmors.csv
supporting_electrolyte_gate:
  # Exclude library entries whose versioned role metadata says they are not bulk supporting
  # electrolytes. This is a role guard, not a metal-deposition model; disable only for an
  # explicitly documented sensitivity analysis. Per-salt rows remain in tier1_all.csv.
  enabled: true
solvent_window_gate:
  # Practical ESW is condition-dependent. Select after the cheap solvent+salt join:
  # exact (solvent,salt) measured rows first, otherwise the conservative measured solvent
  # lower bound. Hard-cap either measurement by min(curated CSV, computed descriptor), so a
  # wider generic formulation can never relax the existing hard gate; use that cap directly
  # when no measurement exists.
  # The computed molecular oxidation descriptor remains in the audit but is no longer allowed
  # to override a conditioned measurement (e.g. water's pathological computed 3.77 V value).
  enabled: true
  policy: measured_first_conservative
  measurements_path: data/solvent_windows.csv
  fallback_policy: min_csv_computed
conformer_search:
  # Directive §4.1 MMFF94 conformer search for geometry generation. enabled=true embeds
  # n_conformers ETKDGv3 conformers, MMFF94-optimizes each, hands the lowest-energy one to xTB.
  # NOT additive: enabling CHANGES geometries, the survivor set, and the scores, so it requires a
  # FRESH Tier-1 harvest + re-validation (the conformer setting is folded into the engine cache
  # key so stale single-conformer geometries are never reused). The single-conformer path
  # (enabled=false) remains available. Se and other non-MMFF-typable atoms fall back to the
  # hardened single ETKDG embed (T10 Se-skip), never force-typed.
  enabled: true
  n_conformers: 100
  method: mmff94
oligomer:
  # Oligomer length for the optical-gap calculation (sTDA-xTB / HOMO-LUMO proxy on the n-mer).
  # n in [4,6] acceptable per directive §4.1; default hexamer. Dimerization uses dimer_n=2.
  n: 6
  dimer_n: 2
  # Lengths for the REPORTED-ONLY oligomer Eox-vs-chain-length descriptor (additive; does NOT
  # enter any hard filter or the composite score). n=1 (the monomer anchor) is added implicitly
  # for the classic 1/n infinite-chain extrapolation.
  eox_oligomer_lengths: [2, 3, 4, 6]
bandgap_convergence:
  # Directive §4.2 oligomer band-gap convergence check: the optical gap (sTDA / HOMO-LUMO proxy)
  # at each oligomer length n, plus the last-step delta |gap(n_max) - gap(n_max-1)| against a
  # threshold (verify convergence at n~4-6 D-A / n~6 homopolymer). Purely ADDITIVE / REPORTED-ONLY.
  enabled: true
  lengths: [1, 2, 3, 4, 5, 6]
  threshold_eV: 0.1
secondary_descriptors:
  # Directive §3 secondary descriptors (monomer frontier orbitals / radical-cation spin /
  # reorganization; solvent oxidation/reduction reorganization; electrolyte cation reduction,
  # anion vdW volume, ion-pair dissociation). Purely ADDITIVE and REPORTED-ONLY: they never
  # enter a hard filter or the composite score. Default on per the directive.
  enabled: true
calibration:
  # Directive §7 mandates the Tier-1 correction be an xTB->DFT linear map ("mapping xTB properties
  # to DFT values ... apply these corrections to all Tier-1 results before filtering"). The loader
  # _oxidation_calibration PREFERS xtb_to_dft.monomer_oxidation when enabled, else falls back to the
  # experiment-anchored monomer_eox below. The DFT-anchored block is the directive target; its
  # slope/intercept are pinned from the live ORCA DFT-on-benchmark run (eps calibrate-dft --engine
  # orca). Flipping its `enabled` to true is the single switch that makes production directive-literal
  # — it then REQUIRES a fresh Tier-1 re-harvest + re-validation (different survivor set).
  xtb_to_dft:
    # Directive §7 CALIBRATION OF RECORD (step 1): the xTB descriptor (V vs Ag/AgCl) -> DFT Eox (V),
    # fit on benchmark monomers with both IPEA-xTB and B3LYP/6-31G(d,p)/SMD/Freq. This IS the
    # directive-mandated calibration. It is recorded here as the calibration of record and shown in
    # the calibration figure; it is NOT applied RAW to the production FILTER because the window gate
    # compares monomer Eox to the measured-first solvent anodic limit, which is in EXPERIMENTAL volts.
    # DFT sits ~0.5 V below experiment (validation: raw DFT->exp MAE 0.496 V; a linear DFT->exp fit
    # removes the offset -> 0.151 V residual), so applying raw xTB->DFT against an experimental-V gate
    # is a T11/T14-class cross-scale comparison (it inflates survivors 3,275->4,211 and flips the §7
    # Tier-1-vs-exp PASS->FAIL). The directive's "apply these corrections" = the COMPOSED
    # xTB->DFT->exp chain, whose experimental-scale realization (composed 0.648/0.116) agrees with the
    # active monomer_eox line (0.730/0.093) within ~0.1 V — so the FILTER uses monomer_eox (below) and
    # stays scale-consistent with the measured gate, while this block carries the xTB->DFT step.
    anchor: dft
    monomer_oxidation:
      enabled: false              # calibration of record; filter applies its experimental-scale realization (monomer_eox)
      scope: all_computed_oxidation
      source: dftcal_orca_partial_2026_06_29_n15   # SGE 418096, 15/37 benchmark monomers (small core; D-A pending)
      slope: 0.7674700404189657
      intercept: -0.5789495913940623
      r2: 0.8831217643300772
      n_points: 15
      notes: "xTB->DFT (V vs Ag/AgCl): dft_Eox_V = 0.7675*xtb_Eox_V - 0.5789, R^2 0.883, MAE 0.122 V, n=15 (SGE 418096, partial — small-monomer core done, big D-A compounds still computing; refit when full). DFT->exp validation (peak, n=10): raw MAE 0.496 V (systematic reference offset, ~0.5 V), linear-corrected MAE 0.151 V. Composed xTB->DFT->exp = 0.6477/0.1164 ~= the active experimental-scale monomer_eox line (0.7304/0.0929), cross-validating the two-stage chain (cf. 417442). Cathodic/EA/optical calibrated separately."
  monomer_eox:
    enabled: true
    anchor: experiment
    scope: all_computed_oxidation
    source: agagcl_peak_relaxed_2026_06_29_ipea_xtb
    slope: 0.7304475347746868
    intercept: 0.09294776538165893
    notes: "INTERIM experiment-anchored map, ACTIVE until the directive §7 xtb_to_dft block above is pinned + enabled. Single oxidation calibration applied to ALL computed oxidation potentials per T11: monomer Eox, solvent ANODIC limit, and anion Eox. NOT applied to the solvent cathodic/reduction limit (a reduction potential, left raw/informational). ENGINE = IPEA-xTB vertical IP (directive §4.1; `xtb --vipea`, GFN1 + empirical shift, ALPB at each solvent dielectric), restored 2026-06-26 (THINK T18). PROFILE SWITCHED 2026-06-29 from agagcl_peak_strict (tier-A only, n=9) to agagcl_peak_relaxed (tier A+B PEAK rows, n_groups=29): under IPEA the relaxed line GENERALIZES BETTER (LOO-CV MAE 0.198 V vs strict 0.246 V), better satisfies the directive's >=30 benchmark-size target, and removes the long-standing tier1.yaml(strict)-vs-calibration_profiles.yaml(relaxed-default) inconsistency. Trade-offs (disclosed): R^2 0.559 (< strict 0.772 — but R^2 is not comparable across n; LOO-CV is the arbiter), slope 0.730 vs 0.931 shrinks every window/anion margin ~22% (tighter survivor set), and tier-B rows add 0.05-0.15 V conversion/junction noise (WITHIN the already-disclaimed 0.15 V floor, T3). Peak/onset SEPARATION preserved (peak-only; never co-fit onset, T1). Honest-floor band 0.20-0.35 V (T3). This remains xTB->EXPERIMENT (directive specifies xTB->DFT); the DFT-anchored xtb_to_dft block above supersedes it once the live ORCA DFT-on-benchmark numbers (SGE 418096) are pinned. The strict-vs-relaxed choice is re-confirmed against that DFT LOO-CV at freeze time. Intercept cancels in every margin, so absolute calibrated solvent/anion numbers are screening-grade extrapolations."
