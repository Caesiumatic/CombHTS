filters:
  min_window_margin_V: 0.3
  min_anion_stability_margin_V: 0.2
  max_solvation_dG_kcal_mol: -3.0
oligomer:
  # Oligomer length for the optical-gap calculation (sTDA-xTB / HOMO-LUMO proxy on the n-mer).
  # n in [4,6] acceptable per directive §4.1; default hexamer. Dimerization uses dimer_n=2.
  n: 6
  dimer_n: 2
calibration:
  monomer_eox:
    enabled: true
    scope: all_computed_oxidation
    source: agagcl_peak_strict_2026_06_17_xtb_v3
    slope: 0.725837
    intercept: -3.145372
    notes: "Single oxidation calibration applied to ALL computed oxidation potentials per T11: monomer Eox, solvent ANODIC limit, and anion Eox. NOT applied to the solvent cathodic/reduction limit (a reduction potential, left raw/informational). Key name kept as monomer_eox for backward compatibility. Profile agagcl_peak_strict; n_points=9; R^2=0.889; in-sample MAE=0.144 V; LOO-CV MAE=0.197 V. Real GFN2-xTB (--iterations 500 --etemp 400, ALPB) on strict benchmark v3 tier-A native-AgAgCl peak rows; fit on monomer data, so absolute calibrated solvent/anion numbers are screening-grade extrapolations (intercept cancels in every margin); provisional, not production-grade."
